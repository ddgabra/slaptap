<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SlapTap — a focused typing trainer for students. Practice speed runs or study your own notes by typing them, with live stats, history, and progress graphs." />
    <meta name="theme-color" content="#0f1116" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%230f1116'/%3E%3Cpath d='M12 39h40v10a5 5 0 0 1-5 5H17a5 5 0 0 1-5-5V39Z' fill='%23ffd166'/%3E%3Cpath d='M16 17h32a6 6 0 0 1 6 6v18H10V23a6 6 0 0 1 6-6Z' fill='%237ee2ff'/%3E%3Cpath d='M19 24h7v6h-7zm10 0h7v6h-7zm10 0h7v6h-7zM18 35h28v5H18z' fill='%230f1116'/%3E%3C/svg%3E" />
    <title>SlapTap — Type faster, study smarter</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="app" id="app">
      <header class="topbar">
        <button class="brand" data-view="speed" aria-label="SlapTap home">
          <span class="logoMark" aria-hidden="true">
            <svg viewBox="0 0 64 64" role="img">
              <path class="logoLid" d="M15 16h34a7 7 0 0 1 7 7v19H8V23a7 7 0 0 1 7-7Z" />
              <path class="logoBase" d="M11 40h42v9a6 6 0 0 1-6 6H17a6 6 0 0 1-6-6v-9Z" />
              <path class="logoKeys" d="M18 24h8v6h-8zm10 0h8v6h-8zm10 0h8v6h-8zM17 35h30v5H17z" />
            </svg>
          </span>
          <span class="logoText">SlapTap</span>
        </button>
        <div class="topActions" aria-label="app tools">
          <button class="ghost testButton" id="testButton" aria-label="Change test" title="Change test">
          <span>Change test</span>
        </button>
        <button class="ghost settingsGear" id="settingsButton" aria-label="Settings" title="Settings">
          <span aria-hidden="true">⚙</span>
          <span>Settings</span>
        </button>
        </div>
      </header>
      <section id="screen"></section>
      <footer class="bottomBar">
        <nav class="nav" aria-label="main">
          <button data-view="speed">Speed</button>
          <button data-view="study">Study</button>
          <button data-view="notes">Notes</button>
          <button data-view="history">History</button>
        </nav>
      </footer>
      <textarea id="typingInput" autocapitalize="none" autocomplete="off" autocorrect="off" spellcheck="false" aria-label="typing input"></textarea>
    </main>
    <div id="modalRoot"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
