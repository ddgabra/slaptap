<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SlapTap</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="app" id="app">
      <header class="topbar">
        <button class="brand" data-view="speed" aria-label="SlapTap home">
          <span class="logoMark" aria-hidden="true">
            <svg viewBox="0 0 64 64" role="img">
              <path class="logoComet" d="M10 41c13-18 27-28 42-31-8 9-13 20-15 33-8-4-17-5-27-2Z" />
              <path class="logoBolt" d="M30 8 17 35h12l-5 21 24-32H35l7-16H30Z" />
              <circle class="logoDot" cx="47" cy="17" r="5" />
            </svg>
          </span>
          <span class="logoText">SlapTap</span>
        </button>
        <nav class="nav" aria-label="main">
          <button data-view="speed">Speed</button>
          <button data-view="study">Study</button>
          <button data-view="notes">Notes</button>
          <button data-view="history">History</button>
        </nav>
      </header>
      <section id="screen"></section>
      <footer class="bottomBar">
        <button class="ghost settingsGear" id="settingsButton" aria-label="Settings" title="Settings">
          <span aria-hidden="true">⚙</span>
          <span>Settings</span>
        </button>
      </footer>
      <textarea id="typingInput" autocapitalize="none" autocomplete="off" autocorrect="off" spellcheck="false" aria-label="typing input"></textarea>
    </main>
    <div id="modalRoot"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
