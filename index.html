<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SlapTap — a focused typing trainer for students. Practice speed runs or study your own notes by typing them, with live stats, history, and progress graphs." />
    <meta name="theme-color" content="#0f1116" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23ffd166'/%3E%3Cpath d='M30 8 17 35h12l-5 21 24-32H35l7-16H30Z' fill='%230f1116'/%3E%3C/svg%3E" />
    <title>SlapTap — Type faster, study smarter</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="app" id="app">
      <header class="topbar">
        <button class="brand" data-view="speed" aria-label="SlapTap home">
          <span class="logoMark" aria-hidden="true">
            <svg viewBox="0 0 64 64" role="img">
              <path class="logoComet" d="M10 41c13-18 27-28 42-31-8 9-13 20-15 33-8-4-17-5-27-2Z" />
              <path class="logoBolt" d="M30 8 17 35h12l-5 21 24-32H35l7-16H30Z" />
              <circle class="logoDot" cx="47" cy="17" r="5" />
            </svg>
          </span>
          <span class="logoText">SlapTap</span>
        </button>
        <nav class="nav" aria-label="main">
          <button data-view="speed">Speed</button>
          <button data-view="study">Study</button>
          <button data-view="notes">Notes</button>
          <button data-view="history">History</button>
        </nav>
      </header>
      <section id="screen"></section>
      <footer class="bottomBar">
        <button class="ghost testButton" id="testButton" aria-label="Change test" title="Change test">
          <span>Change test</span>
        </button>
        <button class="ghost settingsGear" id="settingsButton" aria-label="Settings" title="Settings">
          <span aria-hidden="true">⚙</span>
          <span>Settings</span>
        </button>
      </footer>
      <textarea id="typingInput" autocapitalize="none" autocomplete="off" autocorrect="off" spellcheck="false" aria-label="typing input"></textarea>
    </main>
    <div id="modalRoot"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
